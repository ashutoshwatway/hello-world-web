DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hello World App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
      text-align: center;
      padding-top: 60px;
    }

    .temperature {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Hello 👋</h1>

  <!-- Temperature display -->
  <div class="temperature" id="temperature">
    Loading temperature for Warwick, UK…
  </div>

  <button onclick="sayHello()">Greet me</button>

  <script>
    // -------- Time‑based greeting --------
    function sayHello() {
      const hour = new Date().getHours();
      let greeting;

      if (hour >= 5 && hour < 12) {
        greeting = "Good morning ☀️";
      } else if (hour >= 12 && hour < 17) {
        greeting = "Good afternoon 🌤️";
      } else if (hour >= 17 && hour < 23) {
        greeting = "Good evening 🌙";
      } else {
        greeting = "Hello 👋";
      }

      alert(greeting);
    }

    // -------- Weather (Warwick, UK) --------
    async function loadTemperature() {
      const url =
        "https://api.open-meteo.com/v1/forecast" +
        "?latitude=52.2869" +
        "&longitude=-1.5820" +
        "&current_weather=true";

      try {
        const response = await fetch(url);
        const data = await response.json();

        const temp = data.current_weather.temperature;
        document.getElementById("temperature").innerText =
          `🌡️ Temperature in Warwick, UK: ${temp}°C`;
      } catch (error) {
        document.getElementById("temperature").innerText =
          "Unable to load temperature";
      }
    }

    // Load temperature when page opens
    loadTemperature();
  </script>
</body>
</html>
